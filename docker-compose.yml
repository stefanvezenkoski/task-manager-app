services:
  taskdb:
    image: postgres:16-alpine
    container_name: taskdb
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped


  backend:
    build: ./backend
    image: ${DOCKERHUB_USERNAME}/task-manager-backend:latest
    container_name: backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - taskdb
    restart: unless-stopped

  frontend:
    build: ./frontend
    image: ${DOCKERHUB_USERNAME}/task-manager-frontend:latest
    container_name: frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped


volumes:
  pgdata: